<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WASM Backtest with Pyodide + DuckDB</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:24px}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    #spinner{display:none}
    .hidden{display:none}
    .output{white-space:pre-wrap;background:#f7f7f7;padding:12px;border-radius:6px;border:1px solid #eee}
    button:disabled{opacity:0.6}
  </style>
</head>
<body>
  <h2>Browser Backtest — Pyodide + DuckDB (httpfs)</h2>

  <div class="row">
    <label for="ticker">Ticker:</label>
    <input id="ticker" placeholder="e.g. AAPL" value="AAPL" />
    <label for="start">Start:</label>
    <input id="start" type="date" value="2020-01-01" />
    <label for="end">End:</label>
    <input id="end" type="date" value="2020-12-31" />
    <label style="display:flex;align-items:center"><input id="useLocal" type="checkbox" style="margin-right:6px" />Use local Parquet (<code>data/&lt;TICKER&gt;_1d.parquet</code>)</label>
    <button id="runBtn" disabled>Run Backtest</button>
  </div>

  <div id="spinner" class="row">
    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 100 100'><circle cx='50' cy='50' r='35' stroke='%23777' stroke-width='10' fill='none' stroke-linecap='round' stroke-dasharray='164 56'><animateTransform attributeName='transform' type='rotate' repeatCount='indefinite' dur='1s' from='0 50 50' to='360 50 50'/></circle></svg>" alt="loading" />
    <div id="status">Initializing Pyodide...</div>
  </div>

  <div id="pathBanner" style="margin-top:8px;color:#045;display:none"></div>

  <!-- Data output removed from UI per request -->

  <div style="margin-top:12px">
    <div><strong>Chart:</strong></div>
    <div id="chart" style="height:400px; width:100%; background:#fff; border:1px solid #eee; border-radius:6px"></div>
  </div>

  <!-- Custom Pyodide URL and Backtest result removed per request -->

  <div style="margin-top:12px;color:#a33" id="errorOut" class="hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
  <script type="module" src="scripts/js/main.js"></script>
</body>
</html>
